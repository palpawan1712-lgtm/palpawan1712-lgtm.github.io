name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A61D58: ${{ secrets.A61D58 }}
          B9F2C9: ${{ secrets.B9F2C9 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A61D58', '')
          bm = os.environ.get('B9F2C9', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- ad6413d4a6f1bd8a3706a42085b14db489e539bdd6 -->', gm)
              s2 = s2.replace('<!-- 227b7c5cc0f7e9ba67 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
